<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>Star Castle</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#startBtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;font-size:28px;background:#000;border:3px solid #ff0;color:#ff0;cursor:pointer;font-family:'Courier New',monospace;text-transform:uppercase;z-index:10}
#startBtn:hover{background:#1a1a00;box-shadow:0 0 20px #ff0}
.hud{position:absolute;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;font-size:20px;z-index:5;text-shadow:0 0 10px currentColor}
#score{color:#ff0}
#level{color:#0ff}
#lives{color:#f00}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div id="score">SCORE: 0</div>
  <div id="level">LEVEL: 1</div>
  <div id="lives"></div>
</div>
<button id="startBtn">INSERT COIN</button>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// Game state
let gameState='attract';
let player={x:0,y:0,vx:0,vy:0,angle:-Math.PI/2,speed:0,radius:12};
let cannon={x:0,y:0,angle:0,firing:false,health:10};
let rings=[];
let mines=[];
let bullets=[];
let cannonBullets=[];
let particles=[];
let score=0;
let lives=3;
let level=1;
let ringRegenerating=false;
let regenTimer=0;

// Input state
const keys={};
const touchInput={left:false,right:false,fire:false,thrust:false};

// Initialize rings with proper positions (tighter around cannon)
function initRings(){
  rings=[];
  const centerX=W/2, centerY=H/3;
  for(let i=0;i<3;i++){
    const ring={
      x:centerX,
      y:centerY,
      radius:60+i*35,  // Reduced from 120 to 60, spacing reduced
      segments:[],
      rotation:Math.random()*Math.PI*2,
      speed:(i%2===0?1:-1)*(0.01+level*0.003)
    };
    for(let j=0;j<12;j++){
      ring.segments.push({angle:j*(Math.PI*2/12),hits:2});
    }
    rings.push(ring);
  }
}

// Spawn homing mine from cannon
function spawnHomingMine(){
  const angle=Math.random()*Math.PI*2;
  mines.push({
    x:cannon.x+Math.cos(angle)*30,
    y:cannon.y+Math.sin(angle)*30,
    vx:Math.cos(angle)*1.5,
    vy:Math.sin(angle)*1.5,
    radius:6,
    speed:2+level*0.3,
    tracking:false
  });
}

// Initialize mines (exactly 3)
function initMines(){
  mines=[];
  for(let i=0;i<3;i++){
    spawnHomingMine();
  }
}

// Shoot bullet from player (in direction of ship)
function shoot(){
  const speed=10;
  bullets.push({
    x:player.x+Math.cos(player.angle)*20,
    y:player.y+Math.sin(player.angle)*20,
    vx:Math.cos(player.angle)*speed,
    vy:Math.sin(player.angle)*speed,
    radius:3
  });
}

// Update game
function update(){
  if(gameState!=='playing')return;
  
  // Player rotation (keyboard) - Asteroids style
  if(keys['ArrowLeft']||keys['a'])player.angle-=0.08;
  if(keys['ArrowRight']||keys['d'])player.angle+=0.08;
  
  // Player thrust (keyboard) - Asteroids style
  if(keys['ArrowUp']||keys['w']){
    player.vx+=Math.cos(player.angle)*0.15;
    player.vy+=Math.sin(player.angle)*0.15;
  }
  
  // Touch controls - Asteroids style
  if(touchInput.left)player.angle-=0.08;
  if(touchInput.right)player.angle+=0.08;
  if(touchInput.thrust){
    player.vx+=Math.cos(player.angle)*0.15;
    player.vy+=Math.sin(player.angle)*0.15;
  }
  
  // Apply friction and limits
  player.vx*=0.98;
  player.vy*=0.98;
  const speed=Math.sqrt(player.vx*player.vx+player.vy*player.vy);
  if(speed>8){
    player.vx=(player.vx/speed)*8;
    player.vy=(player.vy/speed)*8;
  }
  
  // Update position with momentum (Asteroids style)
  player.x+=player.vx;
  player.y+=player.vy;
  
  // Wrap around screen edges
  if(player.x<0)player.x=W;
  if(player.x>W)player.x=0;
  if(player.y<0)player.y=H;
  if(player.y>H)player.y=0;
  
  // Update bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    
    // Remove if off screen
    if(b.x<0||b.x>W||b.y<0||b.y>H){
      bullets.splice(i,1);
      continue;
    }
    
    // Check collision with ring segments
    let hit=false;
    for(let r=0;r<rings.length&&!hit;r++){
      const ring=rings[r];
      for(let s=0;s<ring.segments.length&&!hit;s++){
        const seg=ring.segments[s];
        if(seg.hits<=0)continue;
        
        // Calculate segment position
        const segX=ring.x+Math.cos(ring.rotation+seg.angle)*ring.radius;
        const segY=ring.y+Math.sin(ring.rotation+seg.angle)*ring.radius;
        
        // Check distance
        const dist=Math.sqrt((b.x-segX)**2+(b.y-segY)**2);
        if(dist<ring.radius*0.3){
          seg.hits--;
          hit=true;
          
          // Add particles
          for(let p=0;p<5;p++){
            particles.push({
              x:segX,y:segY,
              vx:(Math.random()-0.5)*4,
              vy:(Math.random()-0.5)*4,
              life:30,
              color:'#ff0'
            });
          }
          
          // Check if ring is destroyed
          if(ring.segments.every(s=>s.hits<=0)){
            score+=100*level;
            
            // Check if this is the outer ring (first one) - trigger regeneration
            if(r===0){
              ringRegenerating=true;
              regenTimer=120; // 2 seconds at 60fps
            }
          }
        }
      }
    }
    
    if(hit){
      bullets.splice(i,1);
    }
  }
  
  // Update cannon bullets
  for(let i=cannonBullets.length-1;i>=0;i--){
    const b=cannonBullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    
    // Remove if off screen
    if(b.x<0||b.x>W||b.y<0||b.y>H){
      cannonBullets.splice(i,1);
      continue;
    }
    
    // Check collision with player
    const dist=Math.sqrt((b.x-player.x)**2+(b.y-player.y)**2);
    if(dist<player.radius){
      lives--;
      cannonBullets.splice(i,1);
      
      // Add explosion particles
      for(let p=0;p<20;p++){
        particles.push({
          x:player.x,y:player.y,
          vx:(Math.random()-0.5)*6,
          vy:(Math.random()-0.5)*6,
          life:40,
          color:'#f00'
        });
      }
      
      if(lives<=0){
        gameState='gameover';
      }else{
        // Respawn player
        player.x=W/2;
        player.y=H-100;
        player.vx=0;player.vy=0;player.angle=-Math.PI/2;
      }
    }
  }
  
  // Update mines (homing behavior)
  for(let i=0;i<mines.length;i++){
    const mine=mines[i];
    
    // Track player position (homing)
    const dx=player.x-mine.x;
    const dy=player.y-mine.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    
    if(dist>0){
      mine.vx+=(dx/dist)*mine.speed*0.02;
      mine.vy+=(dy/dist)*mine.speed*0.02;
    }
    
    // Apply velocity with speed limit
    const currentSpeed=Math.sqrt(mine.vx*mine.vx+mine.vy*mine.vy);
    if(currentSpeed>mine.speed){
      mine.vx=(mine.vx/currentSpeed)*mine.speed;
      mine.vy=(mine.vy/currentSpeed)*mine.speed;
    }
    
    // Update position
    mine.x+=mine.vx;
    mine.y+=mine.vy;
    
    // Check collision with player
    const playerDist=Math.sqrt((mine.x-player.x)**2+(mine.y-player.y)**2);
    if(playerDist<player.radius+mine.radius){
      lives--;
      
      // Add explosion particles
      for(let p=0;p<20;p++){
        particles.push({
          x:player.x,y:player.y,
          vx:(Math.random()-0.5)*6,
          vy:(Math.random()-0.5)*6,
          life:40,
          color:'#f00'
        });
      }
      
      // Remove mine and respawn it
      mines.splice(i,1);
      spawnHomingMine();
      
      if(lives<=0){
        gameState='gameover';
      }else{
        // Respawn player
        player.x=W/2;
        player.y=H-100;
        player.vx=0;player.vy=0;player.angle=-Math.PI/2;
      }
    }
  }
  
  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
    
    if(p.life<=0){
      particles.splice(i,1);
    }
  }
  
  // Update ring rotation
  for(let r=0;r<rings.length;r++){
    rings[r].rotation+=rings[r].speed;
  }
  
  // Handle ring regeneration
  if(ringRegenerating){
    regenTimer--;
    if(regenTimer<=0){
      ringRegenerating=false;
      // Move middle ring to outer, inner to middle, create new core
      const tempRing=rings[2]; // Inner ring becomes outer
      rings[2]=rings[1]; // Middle becomes inner
      rings[1]=rings[0]; // Outer becomes middle
      rings[0]=tempRing; // Inner becomes outer
      
      // Reset segments for new outer ring
      rings[0].segments=[];
      for(let j=0;j<12;j++){
        rings[0].segments.push({angle:j*(Math.PI*2/12),hits:2});
      }
      
      // Reset middle ring segments
      rings[1].segments=[];
      for(let j=0;j<12;j++){
        rings[1].segments.push({angle:j*(Math.PI*2/12),hits:2});
      }
      
      // Reset inner ring segments
      rings[2].segments=[];
      for(let j=0;j<12;j++){
        rings[2].segments.push({angle:j*(Math.PI*2/12),hits:2});
      }
      
      // Increase level
      level++;
    }
  }
  
  // Cannon fires when rings are breached (6+ segments destroyed)
  if(!cannon.firing){
    let totalDestroyed=0;
    for(let r=0;r<rings.length;r++){
      for(let s=0;s<rings[r].segments.length;s++){
        if(rings[r].segments[s].hits<=0){
          totalDestroyed++;
        }
      }
    }
    
    if(totalDestroyed>=6){
      cannon.firing=true;
      
      // Fire cannon ball at player
      const angle=Math.atan2(player.y-cannon.y,player.x-cannon.x);
      cannonBullets.push({
        x:cannon.x+Math.cos(angle)*20,
        y:cannon.y+Math.sin(angle)*20,
        vx:Math.cos(angle)*5,
        vy:Math.sin(angle)*5,
        radius:4
      });
      
      // Reset firing after delay
      setTimeout(()=>{cannon.firing=false;},2000);
    }
  }
  
  // Update HUD
  document.getElementById('score').textContent='SCORE: '+score;
  document.getElementById('level').textContent='LEVEL: '+level;
  let livesText='';
  for(let i=0;i<lives;i++)livesText+='♥ ';
  document.getElementById('lives').textContent=livesText;
}

// Draw game
function draw(){
  // Clear screen
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  
  // Draw attract screen
  if(gameState==='attract'){
    ctx.fillStyle='#ff0';
    ctx.font='bold 48px monospace';
    ctx.textAlign='center';
    ctx.fillText('STAR CASTLE',W/2,H/3);
    
    ctx.fillStyle='#0ff';
    ctx.font='24px monospace';
    ctx.fillText('Asteroids-style controls',W/2,H/3+50);
    
    ctx.fillStyle='#fff';
    ctx.font='16px monospace';
    ctx.fillText('← → or A/D to rotate',W/2,H/3+100);
    ctx.fillText('↑ or W to thrust',W/2,H/3+130);
    ctx.fillText('SPACE or tap to fire',W/2,H/3+160);
    
    return;
  }
  
  // Draw rings (wireframe style)
  for(let r=0;r<rings.length;r++){
    const ring=rings[r];
    
    // Draw ring segments
    for(let s=0;s<ring.segments.length;s++){
      const seg=ring.segments[s];
      if(seg.hits<=0)continue;
      
      // Calculate segment position
      const segX=ring.x+Math.cos(ring.rotation+seg.angle)*ring.radius;
      const segY=ring.y+Math.sin(ring.rotation+seg.angle)*ring.radius;
      
      // Draw segment as line
      const nextAngle=ring.rotation+((s+1)%ring.segments.length)*(Math.PI*2/ring.segments.length);
      const nextX=ring.x+Math.cos(nextAngle)*ring.radius;
      const nextY=ring.y+Math.sin(nextAngle)*ring.radius;
      
      ctx.strokeStyle=seg.hits===2?'#ff0':'#f80';
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(segX,segY);
      ctx.lineTo(nextX,nextY);
      ctx.stroke();
    }
  }
  
  // Draw cannon (wireframe style)
  ctx.strokeStyle='#0ff';
  ctx.lineWidth=3;
  
  // Draw cannon body
  const cannonAngle=Math.atan2(player.y-cannon.y,player.x-cannon.x);
  ctx.beginPath();
  ctx.arc(cannon.x,cannon.y,20,0,Math.PI*2);
  ctx.stroke();
  
  // Draw cannon barrel
  ctx.beginPath();
  ctx.moveTo(cannon.x,cannon.y);
  ctx.lineTo(cannon.x+Math.cos(cannonAngle)*30,cannon.y+Math.sin(cannonAngle)*30);
  ctx.stroke();
  
  // Draw cannon health bar
  const healthWidth=40;
  const healthHeight=6;
  ctx.fillStyle='#333';
  ctx.fillRect(cannon.x-healthWidth/2,cannon.y-40,healthWidth,healthHeight);
  ctx.fillStyle=cannon.health>5?'#0f0':'#f00';
  ctx.fillRect(cannon.x-healthWidth/2,cannon.y-40,healthWidth*(cannon.health/10),healthHeight);
  
  // Draw player ship (wireframe triangle)
  ctx.strokeStyle='#0f0';
  ctx.lineWidth=2;
  ctx.beginPath();
  
  // Ship points based on angle
  const noseX=player.x+Math.cos(player.angle)*15;
  const noseY=player.y+Math.sin(player.angle)*15;
  const leftX=player.x+Math.cos(player.angle+2.5)*10;
  const leftY=player.y+Math.sin(player.angle+2.5)*10;
  const rightX=player.x+Math.cos(player.angle-2.5)*10;
  const rightY=player.y+Math.sin(player.angle-2.5)*10;
  
  ctx.moveTo(noseX,noseY);
  ctx.lineTo(leftX,leftY);
  ctx.lineTo(rightX,rightY);
  ctx.closePath();
  ctx.stroke();
  
  // Draw engine glow when thrusting
  if((keys['ArrowUp']||keys['w']||touchInput.thrust)&&gameState==='playing'){
    ctx.fillStyle='rgba(0,255,255,0.3)';
    ctx.beginPath();
    const tailX=player.x-Math.cos(player.angle)*12;
    const tailY=player.y-Math.sin(player.angle)*12;
    ctx.arc(tailX,tailY,8,0,Math.PI*2);
    ctx.fill();
  }
  
  // Draw bullets (cyan lines)
  for(let i=0;i<bullets.length;i++){
    const b=bullets[i];
    ctx.strokeStyle='#0ff';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x-b.vx*2,b.y-b.vy*2);
    ctx.stroke();
  }
  
  // Draw cannon bullets (orange lines)
  for(let i=0;i<cannonBullets.length;i++){
    const b=cannonBullets[i];
    ctx.strokeStyle='#f80';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x-b.vx*2,b.y-b.vy*2);
    ctx.stroke();
  }
  
  // Draw mines (red spinning triangles)
  for(let i=0;i<mines.length;i++){
    const mine=mines[i];
    ctx.strokeStyle='#f00';
    ctx.lineWidth=2;
    
    // Draw triangle that rotates based on position
    const mineAngle=Math.atan2(mine.vy,mine.vx)+Math.PI/2;
    ctx.beginPath();
    
    const triSize=8;
    for(let j=0;j<3;j++){
      const angle=mineAngle+j*(Math.PI*2/3);
      const x=mine.x+Math.cos(angle)*triSize;
      const y=mine.y+Math.sin(angle)*triSize;
      
      if(j===0){
        ctx.moveTo(x,y);
      }else{
        ctx.lineTo(x,y);
      }
    }
    ctx.closePath();
    ctx.stroke();
  }
  
  // Draw particles
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/40;
    ctx.fillRect(p.x-1,p.y-1,2,2);
  }
  ctx.globalAlpha=1;
  
  // Draw touch controls overlay (Asteroids style)
  drawTouchControls();
}

// Draw Asteroids-style touch controls
function drawTouchControls(){
  if(gameState!=='playing')return;
  
  const btnSize=50;
  const padding=20;
  
  // Left button (rotate left)
  ctx.fillStyle=touchInput.left?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.1)';
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=2;
  
  // Left arrow button (bottom left)
  const leftX=padding+btnSize/2;
  const leftY=H-padding-btnSize/2;
  ctx.beginPath();
  ctx.arc(leftX,leftY,btnSize/2,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
  
  // Draw left arrow
  ctx.strokeStyle='rgba(255,255,255,0.8)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(leftX-10,leftY);
  ctx.lineTo(leftX+5,leftY-8);
  ctx.moveTo(leftX+5,leftY-8);
  ctx.lineTo(leftX+5,leftY+8);
  ctx.moveTo(leftX+5,leftY+8);
  ctx.lineTo(leftX-10,leftY);
  ctx.stroke();
  
  // Right button (rotate right)
  const rightX=W-padding-btnSize/2;
  const rightY=H-padding-btnSize/2;
  ctx.fillStyle=touchInput.right?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.arc(rightX,rightY,btnSize/2,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
  
  // Draw right arrow
  ctx.strokeStyle='rgba(255,255,255,0.8)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(rightX+10,rightY);
  ctx.lineTo(rightX-5,rightY-8);
  ctx.moveTo(rightX-5,rightY-8);
  ctx.lineTo(rightX-5,rightY+8);
  ctx.moveTo(rightX-5,rightY+8);
  ctx.lineTo(rightX+10,rightY);
  ctx.stroke();
  
  // Thrust button (top center)
  const thrustX=W/2;
  const thrustY=padding+btnSize/2;
  ctx.fillStyle=touchInput.thrust?'rgba(0,255,255,0.3)':'rgba(0,255,255,0.1)';
  ctx.beginPath();
  ctx.arc(thrustX,thrustY,btnSize/2,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
  
  // Draw thrust arrow (up)
  ctx.strokeStyle='rgba(0,255,255,0.8)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(thrustX,thrustY+10);
  ctx.lineTo(thrustX,thrustY-5);
  ctx.moveTo(thrustX,thrustY-5);
  ctx.lineTo(thrustX-8,rightY+10);
  ctx.moveTo(thrustX,thrustY-5);
  ctx.lineTo(thrustX+8,rightY+10);
  ctx.stroke();
  
  // Fire button (bottom right)
  const fireX=W-padding-btnSize/2;
  const fireY=H-padding-btnSize/2+btnSize+10;
  ctx.fillStyle='rgba(255,0,0,0.3)';
  ctx.beginPath();
  ctx.arc(fireX,fireY,btnSize/2,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
  
  // Fire label
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font='12px monospace';
  ctx.textAlign='center';
  ctx.fillText('FIRE',fireX,fireY+4);
}

// Game loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start/restart game - make global so click handler can access it
window.startGame = function(){
  gameState='playing';
  score=0;lives=3;level=1;
  player.x=W/2;player.y=H-100;
  player.vx=0;player.vy=0;player.angle=-Math.PI/2;
  mines=[];bullets=[];cannonBullets=[];particles=[];
  cannon.health=10;cannon.firing=false;
  ringRegenerating=false;
  initRings();
  initMines();
  document.getElementById('startBtn').style.display='none';
};

window.restartGame = function(){
  window.startGame();
};

document.getElementById('startBtn').addEventListener('click',()=>{
  if(gameState==='attract'||gameState==='ready'){
    window.startGame();
  }else{
    window.restartGame();
  }
});

// Initialize game
player.x=W/2;
player.y=H-100;

// Start loop
loop();
