<!DOCTYPE html>
<html>
<head>
    <title>Star Castle</title>
    <style>
        body { margin: 0; background: black; color: white; font-family: monospace; }
        #game { width: 100vw; height: 100vh; }
        #startBtn { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            padding: 20px; 
            font-size: 24px; 
            background: black; 
            color: yellow;
            border: 2px solid yellow;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <button id="startBtn">START GAME</button>
    
    <script>
        const gameDiv = document.getElementById('game');
        let gameState = 'attract';
        
        function startGame() {
            gameState = 'playing';
            document.getElementById('startBtn').style.display = 'none';
            gameDiv.innerHTML = '<h1 style="text-align:center;margin-top:20%">GAME RUNNING</h1>';
        }
        
        document.getElementById('startBtn').onclick = startGame;
    </script>
</body>
</html>
