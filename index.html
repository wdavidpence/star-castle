<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>Star Castle</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:monospace;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#startBtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;font-size:24px;background:#1a3a5c;border:2px solid #4af;color:#fff;cursor:pointer;border-radius:8px;z-index:10}
#startBtn:hover{background:#2a5a8c}
.hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;font-size:18px;z-index:5}
#score{color:#ff0}
#lives{color:#f00}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div id="score">SCORE: 0</div>
  <div id="lives"></div>
</div>
<button id="startBtn">TAP TO START</button>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// Game state
let state='ready';
let player={x:W/2,y:H-100,vx:0,vy:0,radius:15};
let cannon={x:W/2,y:H/3,angle:0,firing:false};
let rings=[];
let mines=[];
let bullets=[];
let cannonBullets=[];
let score=0;
let lives=3;

// Input state - declared BEFORE use
const keys={};

// Initialize rings with proper positions
function initRings(){
  rings=[];
  for(let i=0;i<3;i++){
    const ring={
      x:W/2,
      y:H/3,
      radius:150+i*60,
      segments:[],
      rotation:Math.random()*Math.PI*2,
      speed:(i%2===0?1:-1)*0.01
    };
    for(let j=0;j<12;j++){
      ring.segments.push({angle:j*(Math.PI*2/12),hits:3});
    }
    rings.push(ring);
  }
}

// Spawn mine
function spawnMine(){
  mines.push({
    x:Math.random()*W,
    y:-20,
    vx:(Math.random()-0.5)*2,
    vy:1+Math.random()*2,
    radius:8
  });
}

// Shoot bullet from player
function shoot(){
  bullets.push({
    x:player.x,
    y:player.y-20,
    vx:(Math.random()-0.5)*3,
    vy:-8,
    radius:4
  });
}

// Update game
function update(){
  if(state!=='playing')return;
  
  // Player movement (keyboard)
  if(keys['ArrowLeft'])player.x-=5;
  if(keys['ArrowRight'])player.x+=5;
  if(player.x<0)player.x=0;
  if(player.x>W)player.x=W;
  
  // Update bullets
  bullets.forEach(b=>{b.y+=b.vy;b.x+=b.vx;});
  bullets=bullets.filter(b=>b.y>-50);
  
  // Update cannon bullets
  cannonBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  cannonBullets=cannonBullets.filter(b=>b.x>0&&b.x<W&&b.y>0&&b.y<H);
  
  // Update mines (spawn rate reduced from 0.02 to 0.005)
  if(Math.random()<0.005 && mines.length<10)spawnMine();
  mines.forEach(m=>{m.y+=m.vy;m.x+=m.vx;});
  mines=mines.filter(m=>m.y<H+50);
  
  // Update ring rotation
  rings.forEach(ring=>{ring.rotation+=ring.speed;});
  
  // Collision: bullets vs ring segments
  bullets.forEach(b=>{
    rings.forEach(ring=>{
      ring.segments.forEach(seg=>{
        if(seg.hits<=0)return;
        const segX=ring.x+Math.cos(ring.rotation+seg.angle)*ring.radius;
        const segY=ring.y+Math.sin(ring.rotation+seg.angle)*ring.radius;
        const dist=Math.sqrt((b.x-segX)**2+(b.y-segY)**2);
        if(dist<ring.radius*0.3){
          seg.hits--;
          b.y=-100; // Remove bullet
        }
      });
    });
  });
  
  // Collision: mines vs player
  mines.forEach(m=>{
    const dist=Math.sqrt((player.x-m.x)**2+(player.y-m.y)**2);
    if(dist<player.radius+m.radius){
      lives--;
      m.y=H+100; // Remove mine
      if(lives<=0)state='gameover';
    }
  });
  
  // Collision: cannon bullets vs player
  cannonBullets.forEach(b=>{
    const dist=Math.sqrt((player.x-b.x)**2+(player.y-b.y)**2);
    if(dist<player.radius+b.radius){
      lives--;
      b.x=-100; // Remove bullet
      if(lives<=0)state='gameover';
    }
  });
  
  // Update cannon (tracks player)
  const dx=player.x-cannon.x;
  const dy=player.y-cannon.y;
  cannon.angle=Math.atan2(dy,dx);
  
  // Cannon fires when rings are destroyed
  const allDestroyed=rings.every(r=>r.segments.every(s=>s.hits<=0));
  if(allDestroyed&&!cannon.firing){
    cannon.firing=true;
    // Fire 3 bullets at player
    for(let i=0;i<3;i++){
      setTimeout(()=>{
        if(cannon.firing){
          const speed=5;
          cannonBullets.push({
            x:cannon.x,
            y:cannon.y,
            vx:Math.cos(cannon.angle)*speed,
            vy:Math.sin(cannon.angle)*speed,
            radius:5
          });
        }
      },i*300);
    }
    setTimeout(()=>{cannon.firing=false;},1500);
  }
  
  // Update HUD
  document.getElementById('score').textContent='SCORE: '+score;
  let hearts='';for(let i=0;i<lives;i++)hearts+='♥ ';
  document.getElementById('lives').textContent=hearts;
}

// Draw game
function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  
  if(state==='ready'){
    ctx.fillStyle='#fff';
    ctx.font='48px monospace';
    ctx.textAlign='center';
    ctx.fillText('STAR CASTLE',W/2,H/3);
    return;
  }
  
  // Draw rings
  rings.forEach(ring=>{
    ctx.strokeStyle='#ff0';
    ctx.lineWidth=3;
    ring.segments.forEach(seg=>{
      if(seg.hits>0){
        const x=ring.x+Math.cos(ring.rotation+seg.angle)*ring.radius;
        const y=ring.y+Math.sin(ring.rotation+seg.angle)*ring.radius;
        ctx.beginPath();
        ctx.arc(x,y,10,0,Math.PI*2);
        ctx.stroke();
      }
    });
  });
  
  // Draw cannon
  ctx.save();
  ctx.translate(cannon.x,cannon.y);
  ctx.rotate(cannon.angle);
  ctx.fillStyle='#fff';
  ctx.fillRect(-20,-5,40,10);
  ctx.restore();
  
  // Draw mines
  ctx.fillStyle='#f00';
  mines.forEach(m=>{
    ctx.beginPath();
    ctx.arc(m.x,m.y,m.radius,0,Math.PI*2);
    ctx.fill();
  });
  
  // Draw bullets
  ctx.fillStyle='#0ff';
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.fill();
  });
  
  // Draw cannon bullets
  ctx.fillStyle='#f80';
  cannonBullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.fill();
  });
  
  // Draw player
  ctx.fillStyle='#0f0';
  ctx.beginPath();
  ctx.moveTo(player.x,player.y-20);
  ctx.lineTo(player.x-15,player.y+15);
  ctx.lineTo(player.x+15,player.y+15);
  ctx.closePath();
  ctx.fill();
  
  if(state==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f00';
    ctx.font='48px monospace';
    ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2);
    ctx.fillStyle='#fff';
    ctx.font='24px monospace';
    ctx.fillText('Tap to restart',W/2,H/2+50);
  }
}

// Game loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input handling - declared before use
window.addEventListener('keydown',e=>{keys[e.key]=true;});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// Touch controls for mobile
let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state==='ready'||state==='gameover'){
    restartGame();
    return;
  }
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(state!=='playing')return;
  const touchX=e.touches[0].clientX;
  player.x=touchX;
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state==='playing'){
    shoot();
  }
},{passive:false});

// Start/restart button
function restartGame(){
  state='playing';
  score=0;lives=3;
  player.x=W/2;player.y=H-100;
  mines=[];bullets=[];cannonBullets=[];
  initRings();
  document.getElementById('startBtn').style.display='none';
}

document.getElementById('startBtn').addEventListener('click',()=>{
  restartGame();
});

// Start loop
loop();
</script>
</body>
</html>
