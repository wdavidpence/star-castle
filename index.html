<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>Star Castle</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#startBtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;font-size:28px;background:#000;border:3px solid #ff0;color:#ff0;cursor:pointer;font-family:'Courier New',monospace;text-transform:uppercase;z-index:10}
#startBtn:hover{background:#1a1a00;box-shadow:0 0 20px #ff0}
.hud{position:absolute;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;font-size:20px;z-index:5;text-shadow:0 0 10px currentColor}
#score{color:#ff0}
#level{color:#0ff}
#lives{color:#f00}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div id="score">SCORE: 0</div>
  <div id="level">LEVEL: 1</div>
  <div id="lives"></div>
</div>
<button id="startBtn">INSERT COIN</button>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// Game state
let state='attract';
let player={x:0,y:0,vx:0,vy:0,angle:-Math.PI/2,speed:0,radius:12};
let cannon={x:0,y:0,angle:0,firing:false,health:10};
let rings=[];
let mines=[];
let bullets=[];
let cannonBullets=[];
let particles=[];
let score=0;
let lives=3;
let level=1;
let ringRegenerating=false;
let regenTimer=0;

// Input state
const keys={};
const touchInput={left:false,right:false,fire:false,thrust:false};

// Initialize rings with proper positions (tighter around cannon)
function initRings(){
  rings=[];
  const centerX=W/2, centerY=H/3;
  for(let i=0;i<3;i++){
    const ring={
      x:centerX,
      y:centerY,
      radius:60+i*35,  // Reduced from 120 to 60, spacing reduced
      segments:[],
      rotation:Math.random()*Math.PI*2,
      speed:(i%2===0?1:-1)*(0.01+level*0.003)
    };
    for(let j=0;j<12;j++){
      ring.segments.push({angle:j*(Math.PI*2/12),hits:2});
    }
    rings.push(ring);
  }
}

// Spawn homing mine from cannon
function spawnHomingMine(){
  const angle=Math.random()*Math.PI*2;
  mines.push({
    x:cannon.x+Math.cos(angle)*30,
    y:cannon.y+Math.sin(angle)*30,
    vx:Math.cos(angle)*1.5,
    vy:Math.sin(angle)*1.5,
    radius:6,
    speed:2+level*0.3,
    tracking:false
  });
}

// Initialize mines (exactly 3)
function initMines(){
  mines=[];
  for(let i=0;i<3;i++){
    spawnHomingMine();
  }
}

// Shoot bullet from player (in direction of ship)
function shoot(){
  const speed=10;
  bullets.push({
    x:player.x+Math.cos(player.angle)*20,
    y:player.y+Math.sin(player.angle)*20,
    vx:Math.cos(player.angle)*speed,
    vy:Math.sin(player.angle)*speed,
    radius:3,
    life:60
  });
}

// Create explosion particles
function createExplosion(x,y,color,count){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*3;
    particles.push({
      x:x,
      y:y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:30+Math.random()*20,
      color:color,
      size:2+Math.random()*3
    });
  }
}

// Update game
function update(){
  if(state!=='playing')return;
  
  // Player rotation (keyboard) - Asteroids style
  if(keys['ArrowLeft']||keys['a'])player.angle-=0.08;
  if(keys['ArrowRight']||keys['d'])player.angle+=0.08;
  
  // Player thrust (keyboard) - Asteroids style with inertia
  if(keys['ArrowUp']||keys['w']){
    player.vx+=Math.cos(player.angle)*0.18;
    player.vy+=Math.sin(player.angle)*0.18;
  }
  
  // Touch joystick controls - full movement
  if(touchJoystick.active){
    const angle=Math.atan2(touchJoystick.dy,touchJoystick.dx);
    player.angle=angle;
    
    const dist=Math.sqrt(touchJoystick.dx*touchJoystick.dx+touchJoystick.dy*touchJoystick.dy);
    if(dist>15){
      const thrust=Math.min(dist/60,1)*0.25;
      player.vx+=Math.cos(angle)*thrust;
      player.vy+=Math.sin(angle)*thrust;
    }
  }
  
  // Apply friction/drag (less than Asteroids for better control)
  player.vx*=0.97;
  player.vy*=0.97;
  
  // Update player position
  player.x+=player.vx;
  player.y+=player.vy;
  
  // Wrap around screen edges (Asteroids style)
  if(player.x<-20)player.x=W+20;
  if(player.x>W+20)player.x=-20;
  if(player.y<-20)player.y=H+20;
  if(player.y>H+20)player.y=-20;
  
  // Update bullets
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
  bullets=bullets.filter(b=>b.life>0&&b.x>-50&&b.x<W+50&&b.y>-50&&b.y<H+50);
  
  // Update cannon bullets
  cannonBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  cannonBullets=cannonBullets.filter(b=>b.x>-50&&b.x<W+50&&b.y>-50&&b.y<H+50);
  
  // Update homing mines (track player)
  mines.forEach(m=>{
    const dx=player.x-m.x;
    const dy=player.y-m.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    
    if(dist>0){
      m.vx+=(dx/dist)*m.speed*0.02;
      m.vy+=(dy/dist)*m.speed*0.02;
    }
    
    // Cap mine speed
    const currentSpeed=Math.sqrt(m.vx*m.vx+m.vy*m.vy);
    if(currentSpeed>m.speed){
      m.vx=(m.vx/currentSpeed)*m.speed;
      m.vy=(m.vy/currentSpeed)*m.speed;
    }
    
    m.x+=m.vx;
    m.y+=m.vy;
  });
  
  // Update ring rotation
  rings.forEach(ring=>{ring.rotation+=ring.speed;});
  
  // Collision: bullets vs ring segments
  bullets.forEach(b=>{
    rings.forEach(ring=>{
      ring.segments.forEach(seg=>{
        if(seg.hits<=0)return;
        const segX=ring.x+Math.cos(ring.rotation+seg.angle)*ring.radius;
        const segY=ring.y+Math.sin(ring.rotation+seg.angle)*ring.radius;
        const dist=Math.sqrt((b.x-segX)**2+(b.y-segY)**2);
        if(dist<ring.radius*0.35){
          seg.hits--;
          b.life=0; // Remove bullet
          if(seg.hits<=0){
            score+=10*level;
            createExplosion(segX,segY,'#ff0',5);
          }
        }
      });
    });
  });
  
  // Collision: mines vs player
  mines.forEach(m=>{
    const dist=Math.sqrt((player.x-m.x)**2+(player.y-m.y)**2);
    if(dist<player.radius+m.radius){
      lives--;
      createExplosion(player.x,player.y,'#f00',20);
      m.x=-1000; // Remove mine
      if(lives<=0)state='gameover';
    }
  });
  
  // Collision: cannon bullets vs player
  cannonBullets.forEach(b=>{
    const dist=Math.sqrt((player.x-b.x)**2+(player.y-b.y)**2);
    if(dist<player.radius+b.radius){
      lives--;
      createExplosion(player.x,player.y,'#f00',20);
      b.x=-1000; // Remove bullet
      if(lives<=0)state='gameover';
    }
  });
  
  // Update particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);
  
  // Update cannon (tracks player)
  const dx=player.x-cannon.x;
  const dy=player.y-cannon.y;
  cannon.angle=Math.atan2(dy,dx);
  
  // Cannon fires when rings are breached (at least 6 segments destroyed)
  const totalDestroyed=rings.reduce((sum,r)=>sum+r.segments.filter(s=>s.hits<=0).length,0);
  if(totalDestroyed>=6&&!cannon.firing){
    cannon.firing=true;
    setTimeout(()=>{
      if(cannon.health>0){
        const speed=6+level;
        cannonBullets.push({
          x:cannon.x+Math.cos(cannon.angle)*25,
          y:cannon.y+Math.sin(cannon.angle)*25,
          vx:Math.cos(cannon.angle)*speed,
          vy:Math.sin(cannon.angle)*speed,
          radius:8
        });
      }
      cannon.firing=false;
    },500+Math.random()*500);
  }
  
  // Ring regeneration check
  if(!ringRegenerating&&rings[0].segments.every(s=>s.hits<=0)){
    ringRegenerating=true;
    regenTimer=120; // 2 seconds at 60fps
  }
  
  if(ringRegenerating){
    regenTimer--;
    if(regenTimer<=0){
      // Regenerate: shift rings down, create new outer ring
      rings.pop(); // Remove innermost (now empty)
      const newRing={
        x:cannon.x,
        y:cannon.y,
        radius:rings[rings.length-1].radius+50,
        segments:[],
        rotation:Math.random()*Math.PI*2,
        speed:(rings.length%2===0?1:-1)*(0.008+level*0.002)
      };
      for(let j=0;j<12;j++){
        newRing.segments.push({angle:j*(Math.PI*2/12),hits:2});
      }
      rings.unshift(newRing); // Add as new outer ring
      
      // Reset all segments to full health
      rings.forEach(r=>r.segments.forEach(s=>s.hits=2));
      
      ringRegenerating=false;
    }
  }
  
  // Update HUD
  document.getElementById('score').textContent='SCORE: '+score;
  document.getElementById('level').textContent='LEVEL: '+level;
  let hearts='';for(let i=0;i<lives;i++)hearts+='♥ ';
  document.getElementById('lives').textContent=hearts;
}

// Draw game with vector style
function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  
  if(state==='attract'){
    ctx.fillStyle='#ff0';
    ctx.font='bold 64px monospace';
    ctx.textAlign='center';
    ctx.shadowColor='#ff0';
    ctx.shadowBlur=20;
    ctx.fillText('STAR CASTLE',W/2,H/3);
    ctx.shadowBlur=0;
    ctx.font='24px monospace';
    ctx.fillStyle='#fff';
    ctx.fillText('INSERT COIN',W/2,H/2);
    return;
  }
  
  if(state==='ready'){
    ctx.fillStyle='#fff';
    ctx.font='48px monospace';
    ctx.textAlign='center';
    ctx.fillText('STAR CASTLE',W/2,H/3);
    return;
  }
  
  // Draw rings (vector style - arc segments)
  ctx.strokeStyle='#ff0';
  ctx.lineWidth=2;
  ctx.shadowColor='#ff0';
  ctx.shadowBlur=10;
  
  rings.forEach(ring=>{
    ring.segments.forEach(seg=>{
      if(seg.hits>0){
        const startAngle=ring.rotation+seg.angle-0.2;
        const endAngle=ring.rotation+seg.angle+0.2;
        ctx.beginPath();
        ctx.arc(ring.x,ring.y,ring.radius,startAngle,endAngle);
        ctx.stroke();
      }
    });
  });
  
  // Draw cannon (vector style)
  ctx.strokeStyle='#fff';
  ctx.lineWidth=3;
  ctx.shadowColor='#fff';
  ctx.shadowBlur=15;
  
  ctx.save();
  ctx.translate(cannon.x,cannon.y);
  ctx.rotate(cannon.angle);
  
  // Cannon barrel
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(25,0);
  ctx.stroke();
  
  // Cannon base
  ctx.beginPath();
  ctx.arc(0,0,15,0,Math.PI*2);
  ctx.stroke();
  
  // Health indicator
  if(cannon.health>0){
    ctx.fillStyle='#f00';
    ctx.fillRect(-10,-25,20*(cannon.health/10),4);
  }
  
  ctx.restore();
  
  // Draw mines (vector style - spinning triangles)
  ctx.strokeStyle='#f00';
  ctx.lineWidth=2;
  ctx.shadowColor='#f00';
  ctx.shadowBlur=10;
  
  mines.forEach(m=>{
    if(m.x<-50||m.x>W+50||m.y<-50||m.y>H+50)return;
    ctx.save();
    ctx.translate(m.x,m.y);
    const rot=Math.atan2(m.vy,m.vx)+Math.PI/2;
    ctx.rotate(rot);
    
    // Triangle mine
    ctx.beginPath();
    ctx.moveTo(0,-m.radius);
    ctx.lineTo(-m.radius*0.7,m.radius*0.7);
    ctx.lineTo(m.radius*0.7,m.radius*0.7);
    ctx.closePath();
    ctx.stroke();
    
    // Inner glow
    ctx.fillStyle='rgba(255,0,0,0.3)';
    ctx.fill();
    
    ctx.restore();
  });
  
  // Draw bullets (vector style - small dots)
  ctx.strokeStyle='#0ff';
  ctx.lineWidth=2;
  ctx.shadowColor='#0ff';
  ctx.shadowBlur=8;
  
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.stroke();
  });
  
  // Draw cannon bullets (vector style - larger glowing orbs)
  ctx.strokeStyle='#f80';
  ctx.lineWidth=3;
  ctx.shadowColor='#f80';
  ctx.shadowBlur=15;
  
  cannonBullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.stroke();
    
    // Inner glow
    ctx.fillStyle='rgba(255,128,0,0.4)';
    ctx.fill();
  });
  
  // Draw player (vector style - triangle outline)
  ctx.strokeStyle='#0f0';
  ctx.lineWidth=2;
  ctx.shadowColor='#0f0';
  ctx.shadowBlur=12;
  
  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.rotate(player.angle+Math.PI/2);
  
  // Ship triangle
  ctx.beginPath();
  ctx.moveTo(0,-player.radius*1.5);
  ctx.lineTo(-player.radius,player.radius);
  ctx.lineTo(player.radius,player.radius);
  ctx.closePath();
  ctx.stroke();
  
  // Engine glow when thrusting
  if(player.vx*Math.cos(player.angle)+player.vy*Math.sin(player.angle)>0){
    ctx.fillStyle='rgba(0,255,0,0.3)';
    ctx.fill();
  }
  
  ctx.restore();
  
  // Draw particles (explosions)
  particles.forEach(p=>{
    ctx.strokeStyle=p.color;
    ctx.lineWidth=2;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=8;
    ctx.globalAlpha=p.life/50;
    
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*(p.life/50),0,Math.PI*2);
    ctx.stroke();
    
    ctx.globalAlpha=1;
  });
  
  // Ring regeneration effect
  if(ringRegenerating){
    ctx.strokeStyle='#0ff';
    ctx.lineWidth=3;
    ctx.shadowColor='#0ff';
    ctx.shadowBlur=20;
    
    const progress=1-(regenTimer/120);
    ctx.beginPath();
    ctx.arc(cannon.x,cannon.y,50+progress*100,0,Math.PI*2*progress);
    ctx.stroke();
  }
  
  if(state==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,W,H);
    
    ctx.fillStyle='#f00';
    ctx.font='bold 64px monospace';
    ctx.textAlign='center';
    ctx.shadowColor='#f00';
    ctx.shadowBlur=20;
    ctx.fillText('GAME OVER',W/2,H/2-50);
    
    ctx.fillStyle='#fff';
    ctx.font='32px monospace';
    ctx.shadowBlur=0;
    ctx.fillText('SCORE: '+score,W/2,H/2+10);
    
    ctx.font='24px monospace';
    ctx.fillText('Tap to restart',W/2,H/2+60);
  }
}

// Game loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input handling - keyboard
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '&&state==='playing'){
    shoot();
  }
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// Touch controls for mobile - joystick style
let touchJoystick={active:false,x:0,y:0,dx:0,dy:0};
let touchFire={active:false,x:0,y:0};

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state==='attract'||state==='ready'){
    startGame();
    return;
  }
  if(state==='gameover'){
    restartGame();
    return;
  }
  
  for(let i=0;i<e.touches.length;i++){
    const touch=e.touches[i];
    
    // Left half: joystick for movement
    if(touch.clientX<W/2&&!touchJoystick.active){
      touchJoystick={active:true,x:touch.clientX,y:touch.clientY,dx:0,dy:0};
    }
    
    // Right half: fire button
    if(touch.clientX>=W/2&&!touchFire.active){
      touchFire={active:true,x:touch.clientX,y:touch.clientY};
    }
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(state!=='playing')return;
  
  for(let i=0;i<e.touches.length;i++){
    const touch=e.touches[i];
    
    // Update joystick position
    if(touchJoystick.active&&touch.clientX<W/2){
      const dx=touch.clientX-touchJoystick.x;
      const dy=touch.clientY-touchJoystick.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const maxDist=50;
      
      if(dist>maxDist){
        touchJoystick.dx=(dx/dist)*maxDist;
        touchJoystick.dy=(dy/dist)*maxDist;
      }else{
        touchJoystick.dx=dx;
        touchJoystick.dy=dy;
      }
      
      // Convert joystick to ship rotation and thrust
      const angle=Math.atan2(touchJoystick.dy,touchJoystick.dx);
      player.angle=angle;
      
      if(dist>10){
        const thrust=Math.min(dist/50,1)*0.2;
        player.vx+=Math.cos(angle)*thrust;
        player.vy+=Math.sin(angle)*thrust;
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state!=='playing')return;
  
  for(let i=0;i<e.changedTouches.length;i++){
    const touch=e.changedTouches[i];
    
    // Release joystick
    if(touch.clientX<W/2){
      touchJoystick={active:false,x:0,y:0,dx:0,dy:0};
    }
    
    // Release fire button
    if(touch.clientX>=W/2){
      touchFire={active:false,x:0,y:0};
    }
  }
},{passive:false});

// Draw touch controls overlay
function drawTouchControls(){
  if(state!=='playing')return;
  
  // Left joystick area (transparent)
  ctx.strokeStyle='rgba(255,255,255,0.1)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(W/4,H*0.75,60,0,Math.PI*2);
  ctx.stroke();
  
  // Joystick indicator
  if(touchJoystick.active){
    const jx=W/4+touchJoystick.dx;
    const jy=H*0.75+touchJoystick.dy;
    ctx.fillStyle='rgba(0,255,0,0.3)';
    ctx.beginPath();
    ctx.arc(jx,jy,20,0,Math.PI*2);
    ctx.fill();
  }else{
    ctx.fillStyle='rgba(0,255,0,0.2)';
    ctx.beginPath();
    ctx.arc(W/4,H*0.75,20,0,Math.PI*2);
    ctx.fill();
  }
  
  // Right fire button (transparent)
  ctx.strokeStyle='rgba(255,0,0,0.1)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(W*0.75,H*0.75,50,0,Math.PI*2);
  ctx.stroke();
  
  // Fire button indicator
  if(touchFire.active){
    ctx.fillStyle='rgba(255,0,0,0.4)';
  }else{
    ctx.fillStyle='rgba(255,0,0,0.2)';
  }
  ctx.beginPath();
  ctx.arc(W*0.75,H*0.75,40,0,Math.PI*2);
  ctx.fill();
  
  // Labels
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font='14px monospace';
  ctx.textAlign='center';
  ctx.fillText('MOVE',W/4,H*0.75+80);
  ctx.fillText('FIRE',W*0.75,H*0.75+65);
}

// Game loop
function loop(){
  update();
  draw();
  drawTouchControls();
  requestAnimationFrame(loop);
}

// Start/restart game
function startGame(){
  state='playing';
  score=0;lives=3;level=1;
  player.x=W/2;player.y=H-100;
  player.vx=0;player.vy=0;player.angle=-Math.PI/2;
  mines=[];bullets=[];cannonBullets=[];particles=[];
  cannon.health=10;cannon.firing=false;
  ringRegenerating=false;
  initRings();
  initMines();
  document.getElementById('startBtn').style.display='none';
}

function restartGame(){
  startGame();
}

document.getElementById('startBtn').addEventListener('click',()=>{
  if(state==='attract'||state==='ready'){
    startGame();
  }else{
    restartGame();
  }
});

// Initialize game
player.x=W/2;
player.y=H-100;

// Start loop
loop();
